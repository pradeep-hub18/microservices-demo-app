apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: microservices-demo-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/pradeep-hub18/microservices-demo-app.git
    targetRevision: main
    path: helm/microservices-demo
    helm:
      valueFiles:
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: microservices
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
