{{- if .Values.albIngress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.albIngress.name }}
  namespace: {{ .Values.albIngress.namespace }}
  labels:
    {{- include "microservices-demo.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.albIngress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.albIngress.ingressClassName }}
  rules:
    -{{ if .Values.albIngress.host }}
      host: {{ .Values.albIngress.host | quote }}
      {{- end }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.albIngress.istioIngressGatewayService.name }}
                port:
                  number: {{ .Values.albIngress.istioIngressGatewayService.port }}
{{- end }}
